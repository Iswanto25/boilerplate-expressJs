services:
    boilerplate-express-backend:
        image: boilerplate-express-backend:1.0.0
        container_name: boilerplate-express-backend
        build:
            context: .
            dockerfile: Dockerfile
        env_file:
            - .env
        volumes:
            - boilerplate-express-backend_logs:/app/logger
            - uploads_data:/app/uploads
        environment:
            DOCKER_ENV: "true"
            APP_NAME: ${APP_NAME:-}
            NODE_ENV: ${NODE_ENV:-development}
            PORT: ${PORT:-4039}
            DATABASE_URL: ${DATABASE_URL:-}
            REDIS_HOST: ${REDIS_HOST:-}
            REDIS_PORT: ${REDIS_PORT:-6379}
            REDIS_PASSWORD: ${REDIS_PASSWORD:-}
            REDIS_DB: ${REDIS_DB:-0}
            DATA_ENCRYPTION_KEY: ${DATA_ENCRYPTION_KEY:-}
            JWT_SECRET: ${JWT_SECRET:-}
            JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-}
            ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-15m}
            REFRESH_TOKEN_EXPIRES_IN: ${REFRESH_TOKEN_EXPIRES_IN:-7d}
            MINIO_ENDPOINT: ${MINIO_ENDPOINT:-}
            MINIO_PORT: ${MINIO_PORT:-9000}
            MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-}
            MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-}
            MINIO_BUCKET_NAME: ${MINIO_BUCKET_NAME:-uploads}
            MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
            STORAGE_PUBLIC_URL: ${STORAGE_PUBLIC_URL:-}
            MINIO_REGION: ${MINIO_REGION:-us-east-1}
            SMTP_HOST: ${SMTP_HOST:-}
            SMTP_PORT: ${SMTP_PORT:-587}
            SMTP_SECURE: ${SMTP_SECURE:-false}
            SMTP_USER: ${SMTP_USER:-}
            SMTP_PASS: ${SMTP_PASS:-}
            SMTP_FROM: ${SMTP_FROM:-}
            USER_KEY: ${USER_KEY:-}
            SECRET_KEY: ${SECRET_KEY:-}
        ports:
            - "${PORT:-4039}:${PORT:-4039}"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        restart: unless-stopped

volumes:
    boilerplate-express-backend_logs:
    uploads_data:
    logger_data:
